name: Build

on:
  push:
    branches:
      - main
      - develop

  pull_request:

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build 3Tide Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore ./Jellyfin.Plugin.ThreeTide.csproj

      - name: Build
        run: >
          dotnet build
          ./Jellyfin.Plugin.ThreeTide.csproj
          --configuration Release
          --no-restore

      - name: Prepare plugin package
        shell: bash
        run: |
          set -e

          OUTPUT_DIR="bin/Release/net9.0"
          PACKAGE_DIR="artifacts/ThreeTide"

          mkdir -p "$PACKAGE_DIR"

          cp \
            "$OUTPUT_DIR/Jellyfin.Plugin.ThreeTide.dll" \
            "$PACKAGE_DIR/Jellyfin.Plugin.ThreeTide.dll"

          if [ -f "$OUTPUT_DIR/Jellyfin.Plugin.ThreeTide.pdb" ]; then
            cp \
              "$OUTPUT_DIR/Jellyfin.Plugin.ThreeTide.pdb" \
              "$PACKAGE_DIR/Jellyfin.Plugin.ThreeTide.pdb"
          fi

          cd "$PACKAGE_DIR"
          zip -r "../ThreeTide-dev.zip" .

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: ThreeTide-DLL
          path: bin/Release/net9.0/Jellyfin.Plugin.ThreeTide.dll
          if-no-files-found: error

      - name: Upload plugin ZIP
        uses: actions/upload-artifact@v4
        with:
          name: ThreeTide-Plugin
          path: artifacts/ThreeTide-dev.zip
          if-no-files-found: error