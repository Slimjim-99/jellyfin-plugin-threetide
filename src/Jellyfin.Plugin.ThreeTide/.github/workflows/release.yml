name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore ThreeTide.Plugin.sln

      - name: Build
        run: dotnet build ThreeTide.Plugin.sln --configuration Release --no-restore

      - name: Determine version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p artifacts/3Tide
          cp src/Jellyfin.Plugin.ThreeTide/bin/Release/net9.0/Jellyfin.Plugin.ThreeTide.dll artifacts/3Tide/
          if [ -f src/Jellyfin.Plugin.ThreeTide/bin/Release/net9.0/Jellyfin.Plugin.ThreeTide.pdb ]; then
            cp src/Jellyfin.Plugin.ThreeTide/bin/Release/net9.0/Jellyfin.Plugin.ThreeTide.pdb artifacts/3Tide/
          fi
          cd artifacts/3Tide
          zip -r "../ThreeTide-${VERSION}.zip" .
          cd ..
          sha256sum "ThreeTide-${VERSION}.zip" > "ThreeTide-${VERSION}.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/ThreeTide-${{ steps.version.outputs.version }}.zip
            artifacts/ThreeTide-${{ steps.version.outputs.version }}.sha256
